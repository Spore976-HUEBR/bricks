<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricks! - Join millions of builders</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Fundo Azul Clássico com efeito de Cidade/Gradiente */
        body {
            background: linear-gradient(to bottom, #1d528f 0%, #0c2b50 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Barra de topo minimalista (apenas Logo e Login) */
        header {
            width: 100%;
            max-width: 960px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0px #b30000;
            font-style: italic;
        }

        .login-link {
            color: #fff;
            font-weight: bold;
            font-size: 13px;
            text-decoration: none;
        }

        /* Título Principal */
        .hero-title {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0 30px 0;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        /* Grid de 2 Colunas */
        .main-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 30px;
            align-items: start;
        }

        /* Coluna da Esquerda: Vídeo Promo */
        .video-section {
            text-align: center;
        }

        .video-box {
            background: #000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            aspect-ratio: 16 / 9;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-subtext {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
        }

        /* Coluna da Direita: Formulário de Cadastro */
        .signup-card {
            background: rgba(12, 43, 80, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .signup-card h3 {
            font-size: 16px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #d0e0f0;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #002554;
            border-radius: 3px;
            font-size: 12px;
        }

        .dob-group {
            display: flex;
            gap: 5px;
        }

        .gender-group {
            display: flex;
            gap: 15px;
            font-size: 12px;
            margin-top: 4px;
        }

        /* Botão Grande Verde de Registo */
        .btn-signup {
            width: 100%;
            background: linear-gradient(to bottom, #5cb85c, #3e8e41);
            border: 1px solid #2e6da4;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 2px 4px rgba(0,0,0,0.3);
        }

        .btn-signup:hover {
            background: linear-gradient(to bottom, #4cae4c, #398439);
        }

        .terms-text {
            font-size: 10px;
            color: #a0c0e0;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">BRICKS!</div>
        <a href="#" class="login-link">Entrar (Login)</a>
    </header>

    <div class="hero-title">
        Junta-te a milhares de construtores e explora as suas criações!
    </div>

    <main class="main-container">
        
        <section class="video-section">
            <div class="video-box">
                <p style="color: #888;">[ Trailer do Jogo - What will you build? ]</p>
            </div>
            <div class="video-subtext">O que vais construir hoje?</div>
        </section>

        <section class="signup-card">
            <h3>Cria a tua conta e joga!</h3>
            
            <form action="/register" method="POST">
                <div class="form-group">
                    <label>Data de Nascimento:</label>
                    <div class="dob-group">
                        <select name="month">
                            <option>Mês</option>
                            <option>Jan</option>
                            <option>Fev</option>
                        </select>
                        <select name="day">
                            <option>Dia</option>
                            <option>1</option>
                            <option>15</option>
                        </select>
                        <select name="year">
                            <option>Ano</option>
                            <option>2010</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Género / Estilo Inicial:</label>
                    <div class="gender-group">
                        <label><input type="radio" name="gender" value="male" checked> Masculino</label>
                        <label><input type="radio" name="gender" value="female"> Feminino</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nome de Utilizador:</label>
                    <input type="text" name="username" placeholder="3-20 caracteres alfanuméricos">
                </div>

                <div class="form-group">
                    <label>Palavra-passe:</label>
                    <input type="password" name="password" placeholder="Mínimo 6 caracteres">
                </div>

                <div class="form-group">
                    <label>Confirmar Palavra-passe:</label>
                    <input type="password" name="confirm_password">
                </div>

                <button type="submit" class="btn-signup">Registar Agora</button>

                <p class="terms-text">
                    Ao clicares em Registar, concordas com os Termos de Serviço e a Política de Privacidade do Bricks!.
                </p>
            </form>
        </section>

    </main>

</body>
</html>
